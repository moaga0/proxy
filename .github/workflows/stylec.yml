name: stylec-crawler

on:
  workflow_dispatch: {}

jobs:
  crawl:
    runs-on: ubuntu-latest

    env:
      VISIT_MAX_PAGE: "5"
      SHIPPING_MAX_PAGE: "6"
      UA: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Initialize result.json
        run: |
          echo '{
            "visit": { "pages": [] },
            "shipping": { "pages": [] }
          }' > result.json

      - name: Prepare temp folders
        run: |
          mkdir -p tmp/visit tmp/shipping

      - name: Create fetch helper
        run: |
          cat > fetch_detail.sh <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail

          WRID="$1"
          OUTFILE="$2"

          TMPFILE="$(mktemp)"

          if curl -sS --connect-timeout 10 --max-time 30 \
            -H "User-Agent: $UA" \
            -H "Referer: https://www.stylec.co.kr/" \
            "https://api2.stylec.co.kr:6439/v1/trial/detail?wr_id=${WRID}" \
            -o "$TMPFILE"; then

            if jq empty "$TMPFILE" >/dev/null 2>&1; then
              mv "$TMPFILE" "$OUTFILE"
            else
              echo "Invalid JSON skipped: wr_id=${WRID}"
              rm -f "$TMPFILE"
            fi
          else
            echo "curl failed: wr_id=${WRID}"
            rm -f "$TMPFILE"
          fi
          BASH

          chmod +x fetch_detail.sh

      - name: Crawl Visit Trials with Details (Parallel=2)
        run: |
          set -euo pipefail

          for ((p=1; p<=${VISIT_MAX_PAGE}; p++)); do
            echo "Fetching Visit Trials Page $p"

            RES_FILE="$(mktemp)"
            curl -sS --connect-timeout 10 --max-time 30 \
              -H "User-Agent: $UA" \
              -H "Referer: https://www.stylec.co.kr/" \
              "https://api2.stylec.co.kr:6439/v1/trial?order=wr_last&page=$p&count=50&campaignType[]=%EB%B0%A9%EB%AC%B8%ED%98%95&include_finish=false" \
              -o "$RES_FILE"

            if ! jq empty "$RES_FILE" >/dev/null 2>&1; then
              echo "Invalid page JSON on visit page $p, skipping"
              rm -f "$RES_FILE"
              continue
            fi

            COUNT=$(jq '.data.data | length' "$RES_FILE")
            if [ "$COUNT" -eq 0 ]; then
              echo "No more Visit Trials, stopping."
              rm -f "$RES_FILE"
              break
            fi

            jq -r '.data.data[].wr_id' "$RES_FILE" | xargs -P2 -I{} ./fetch_detail.sh {} "tmp/visit/{}.json"
            rm -f "$RES_FILE"

            if find tmp/visit -maxdepth 1 -name '*.json' | grep -q .; then
              find tmp/visit -maxdepth 1 -name '*.json' -print0 | xargs -0 jq -s '.' > "tmp/visit_page_${p}.json"

              jq --arg p "$p" --slurpfile pageData "tmp/visit_page_${p}.json" \
                '.visit.pages += [{"page": ($p|tonumber), "data": $pageData[0]}]' result.json > tmp.json
              mv tmp.json result.json
            else
              echo "No valid visit detail JSON files on page $p"
            fi

            rm -f tmp/visit/*.json
          done

      - name: Crawl Shipping Trials with Details (Parallel=2)
        run: |
          set -euo pipefail

          for ((p=1; p<=${SHIPPING_MAX_PAGE}; p++)); do
            echo "Fetching Shipping Trials Page $p"

            RES_FILE="$(mktemp)"
            curl -sS --connect-timeout 10 --max-time 30 \
              -H "User-Agent: $UA" \
              -H "Referer: https://www.stylec.co.kr/" \
              "https://api2.stylec.co.kr:6439/v1/trial?order=wr_last&page=$p&count=50&campaignType[]=%EB%AF%B8%EC%85%98%2F%EC%9D%B8%EC%A6%9D&campaignType[]=%EB%B0%B0%EB%8B%AC%ED%98%95&campaignType[]=%EA%B5%AC%EB%A7%A4%ED%8F%89&campaignType[]=%ED%8E%98%EC%9D%B4%EB%B0%B1%EF%BC%8B%EA%B5%AC%EB%A7%A4%ED%8F%89&campaignType[]=%ED%8E%98%EC%9D%B4%EB%B0%B1%ED%98%95&include_finish=false" \
              -o "$RES_FILE"

            if ! jq empty "$RES_FILE" >/dev/null 2>&1; then
              echo "Invalid page JSON on shipping page $p, skipping"
              rm -f "$RES_FILE"
              continue
            fi

            COUNT=$(jq '.data.data | length' "$RES_FILE")
            if [ "$COUNT" -eq 0 ]; then
              echo "No more Shipping Trials, stopping."
              rm -f "$RES_FILE"
              break
            fi

            jq -r '.data.data[].wr_id' "$RES_FILE" | xargs -P2 -I{} ./fetch_detail.sh {} "tmp/shipping/{}.json"
            rm -f "$RES_FILE"

            if find tmp/shipping -maxdepth 1 -name '*.json' | grep -q .; then
              find tmp/shipping -maxdepth 1 -name '*.json' -print0 | xargs -0 jq -s '.' > "tmp/shipping_page_${p}.json"

              jq --arg p "$p" --slurpfile pageData "tmp/shipping_page_${p}.json" \
                '.shipping.pages += [{"page": ($p|tonumber), "data": $pageData[0]}]' result.json > tmp.json
              mv tmp.json result.json
            else
              echo "No valid shipping detail JSON files on page $p"
            fi

            rm -f tmp/shipping/*.json
          done

      - name: Upload result.json
        uses: actions/upload-artifact@v4
        with:
          name: stylec-result
          path: result.json
